<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>文章</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: url('https://fastly.picsum.photos/id/888/1920/1080.jpg?hmac=gILdWiv5GfYCDYWFiZrEcK8TpR6X-Mm05tExxvr6YsY') no-repeat center center/cover;
            font-family: Arial, sans-serif;
            color: white;
            padding-bottom: 40px;
        }

        /* 顶部导航 */
        .nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            font-size: 18px;
        }

        .nav-left {
            font-weight: bold;
            font-size: 22px;
        }

        .nav-right span {
            margin-left: 20px;
            cursor: pointer;
            display: inline-block;
            padding: 6px 12px;
            border: 1px solid transparent;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .nav-right span:hover {
            background: transparent;
            border-color: #fff;
            color: #fff;
        }

        /* 页面主体布局 */
        .main {
            width: 1200px;
            max-width: calc(100% - 40px);
            margin: 20px auto 0;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* 右侧内容区 */
        .center {
            flex: 1;
            min-width: 0;
            background: rgba(0, 0, 0, 0.28);
            border-radius: 12px;
            padding: 20px;
        }

        /* 列表卡片 */
        .title {
            font-size: 30px;
            margin-bottom: 20px;
        }

        .desc {
            font-size: 16px;
            margin-bottom: 20px;
            color: #ddd;
        }

        .list {
            list-style: none;
        }

        .item {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 14px;
            cursor: pointer;
        }

        .item-title {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .item-content {
            font-size: 15px;
            line-height: 1.8;
            color: #e3e3e3;
            margin-bottom: 10px;
        }

        .item-time {
            font-size: 13px;
            color: #cfcfcf;
        }

        .empty {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            font-size: 16px;
            color: #ddd;
        }

        .loading {
            text-align: center;
            color: #ddd;
            padding: 12px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- 顶部 -->
<div class="nav">
    <div class="nav-left">WANGLIU</div>
    <div class="nav-right">
        <span onclick="window.location.href='/index.html'">首页</span>
        <span onclick="window.location.href='/article.html'">文章</span>
        <span onclick="window.location.href='/repo.html'">仓库</span>
        <span onclick="window.location.href='/hot.html'">热点</span>
        <span onclick="window.location.href='/publish.html'">发布</span>
    </div>
</div>

<!-- 中间 -->
<div class="main">
    <div class="center">
        <div class="title">最近 20 天文章</div>
        <div class="desc" id="articleDesc">正在加载文章...</div>
        <ul class="list" id="resultList"></ul>
        <div class="empty" id="emptyBox" style="display:none;">最近 20 天暂无文章</div>
        <div class="loading" id="loadingText">下滑加载更多...</div>
    </div>
</div>

<script>
    const token = localStorage.getItem("token");
    if (!token) {
        window.location.href = "/login.html";
    }

    //页面元素缓存
    const resultList = document.getElementById("resultList");
    const emptyBox = document.getElementById("emptyBox");
    const articleDesc = document.getElementById("articleDesc");
    const loadingText = document.getElementById("loadingText");

    //分页参数
    let pageNum = 1;
    const pageSize = 10;
    let isLoading = false;
    let hasMore = true;
    let totalShown = 0;
    const cutoffTime = Date.now() - 20 * 24 * 60 * 60 * 1000;

    //文章字段兼容功能
    function getText(post) {
        return post.summary || post.context || post.content || post.desc || "";
    }

    function getTitle(post) {
        return post.title || post.name || "未命名文章";
    }

    function getTime(post) {
        return post.createTime || post.createdAt || post.time || "";
    }

    //判断文章是否在20天内
    function isWithin20Days(post) {
        const rawTime = getTime(post);
        if (!rawTime) return false;
        const parsed = new Date(rawTime).getTime();
        if (Number.isNaN(parsed)) return false;
        return parsed >= cutoffTime;
    }

    //文章列表追加渲染功能
    function appendPosts(posts) {
        posts.forEach(post => {
            const li = document.createElement("li");
            li.className = "item";
            li.innerHTML = `
                <div class="item-title">${getTitle(post)}</div>
                <div class="item-content">${getText(post)}</div>
                <div class="item-time">${getTime(post)}</div>
            `;

            li.addEventListener("click", function() {
                const id = post.id || post.postId;
                if (id) {
                    window.location.href = "/post-detail.html?id=" + id;
                }
            });

            resultList.appendChild(li);
        });
    }

    //分页接口请求功能
    function fetchPage(num) {
        const queryUrl = `/post/page?pageNum=${encodeURIComponent(num)}&pageSize=${encodeURIComponent(pageSize)}`;
        return fetch(queryUrl, {
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('token')
            }
        }).then(res => res.json());
    }

    //文章分页加载功能
    function loadMorePosts() {
        if (isLoading || !hasMore) return;
        isLoading = true;
        loadingText.innerText = "加载中...";

        fetchPage(pageNum)
            .then(data => {
                const pagePosts = data && data.code === 200 ? (data.data || []) : [];

                if (!Array.isArray(pagePosts) || pagePosts.length === 0) {
                    hasMore = false;
                    if (totalShown === 0) {
                        emptyBox.style.display = "block";
                        articleDesc.innerText = "共 0 篇近 20 天文章";
                    }
                    loadingText.innerText = "没有更多了";
                    return;
                }

                const filteredPosts = pagePosts.filter(isWithin20Days);
                if (filteredPosts.length > 0) {
                    emptyBox.style.display = "none";
                    appendPosts(filteredPosts);
                    totalShown += filteredPosts.length;
                    articleDesc.innerText = `已加载 ${totalShown} 篇近 20 天文章`;
                }

                //按时间倒序的前提下：一整页都不是20天内，就可以停止翻页
                if (filteredPosts.length === 0) {
                    hasMore = false;
                    if (totalShown === 0) {
                        emptyBox.style.display = "block";
                        articleDesc.innerText = "共 0 篇近 20 天文章";
                    }
                    loadingText.innerText = "没有更多了";
                    return;
                }

                pageNum += 1;
                loadingText.innerText = "下滑加载更多...";
            })
            .catch(() => {
                loadingText.innerText = "加载失败，请稍后重试";
            })
            .finally(() => {
                isLoading = false;
            });
    }

    //滚动触底加载功能
    window.addEventListener("scroll", function() {
        const scrollTop = window.scrollY || document.documentElement.scrollTop;
        const viewportHeight = window.innerHeight;
        const fullHeight = document.documentElement.scrollHeight;
        if (fullHeight - (scrollTop + viewportHeight) < 120) {
            loadMorePosts();
        }
    });

    //页面初始化
    loadMorePosts();
</script>

</body>
</html>

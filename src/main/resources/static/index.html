<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Blog Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: url('https://fastly.picsum.photos/id/888/1920/1080.jpg?hmac=gILdWiv5GfYCDYWFiZrEcK8TpR6X-Mm05tExxvr6YsY') no-repeat center center/cover;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* 顶部导航 */
        .nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            font-size: 18px;
        }

        .nav-left {
            font-weight: bold;
            font-size: 22px;
        }

        .nav-right span {
            margin-left: 20px;
            cursor: pointer;
            display: inline-block;
            padding: 6px 12px;
            border: 1px solid transparent;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .nav-right span:hover {
            background: transparent;
            border-color: #fff;
            color: #fff;
        }

        /* 中间内容 */
        .center {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .time {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .date {
            font-size: 20px;
            margin-bottom: 30px;
        }

        /* 搜索框 */
        .search {
            width: 500px;
            padding: 15px;
            border-radius: 30px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.2);
            color: white;
            text-align: center;
            font-size: 16px;
        }

        .search::placeholder {
            color: #ddd;
        }
    </style>
</head>
<body>

<!-- 顶部 -->
<div class="nav">
    <div class="nav-left">WANGLIU</div>
    <div class="nav-right">
        <span onclick="window.location.href='/index.html'">首页</span>
        <span onclick="window.location.href='/article.html'">文章</span>
        <span onclick="window.location.href='/repo.html'">仓库</span>
        <span onclick="window.location.href='/hot.html'">热点</span>
        <span onclick="window.location.href='/publish.html'">发布</span>
    </div>
</div>

<!-- 中间 -->
<div class="center">
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
    <input class="search" id="searchInput" placeholder="搜点什么吧..." />
</div>

<script>
    const token = localStorage.getItem("token");

    if (!token) {
        window.location.href = "/login.html";
    } else {
        // 👇 可选：顺手解析 userId（防止没存成功）
        try {
            const payload = JSON.parse(atob(token.split(".")[1]));
            const userId = payload.userId || payload.id;

            if (userId && !localStorage.getItem("userId")) {
                localStorage.setItem("userId", userId);
            }
        } catch (e) {
            console.log("token解析失败");
        }
    }

    //时间刷新功能
    function updateTime() {
        const now = new Date();

        const time = now.toLocaleTimeString();
        const date = now.toLocaleDateString();

        document.getElementById('time').innerText = time;
        document.getElementById('date').innerText = date;
    }
    setInterval(updateTime, 1000);
    updateTime();

    //框框查询功能
    function search() {
        const keyword = document.getElementById("searchInput").value.trim();
        if (!keyword) return;
        window.location.href = `/search.html?keyword=${encodeURIComponent(keyword)}`;
    }
    document.getElementById("searchInput")
        .addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                search();
            }
        });




</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: url('https://fastly.picsum.photos/id/330/1920/1080.jpg?hmac=1U_9bH5VS8l-_PJBf1Yrfp-d9NuhgOr4Zjditft-7sw') no-repeat center center/cover;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 350px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            color: white;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 30px;
        }

        .input-box {
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .input-box input::placeholder {
            color: #ddd;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #4facfe;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .extra {
            margin-top: 15px;
            font-size: 14px;
        }

        .extra a {
            color: #ccc;
            text-decoration: none;
        }

        .extra a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>注册</h2>

    <div class="input-box">
        <input id="username" placeholder="用户名" autocomplete="username">
    </div>

    <div class="input-box">
        <input id="password" type="password" placeholder="密码" autocomplete="new-password">
    </div>

    <div class="input-box">
        <input id="password2" type="password" placeholder="确认密码" autocomplete="new-password">
    </div>

    <button class="btn" onclick="register()">注册</button>

    <div class="extra">
        <a href="/login.html">已有账号？去登录</a>
    </div>
</div>

<script>
    function register() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;

        if (!username || !password) {
            alert('用户名和密码不能为空');
            return;
        }
        if (password !== password2) {
            alert('两次输入的密码不一致');
            return;
        }

        fetch('/user/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password })
        })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    alert('注册成功，请登录');
                    window.location.href = '/login.html';
                } else {
                    const msg = data.message || data.msg || '注册失败';
                    alert(msg);
                }
            })
            .catch(err => {
                console.error('请求失败:', err);
                alert('网络错误，请稍后重试');
            });
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>搜索结果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: url('https://fastly.picsum.photos/id/888/1920/1080.jpg?hmac=gILdWiv5GfYCDYWFiZrEcK8TpR6X-Mm05tExxvr6YsY') no-repeat center center/cover;
            font-family: Arial, sans-serif;
            color: white;
            padding-bottom: 40px;
        }

        /* 顶部导航 */
        .nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            font-size: 18px;
        }

        .nav-left {
            font-weight: bold;
            font-size: 22px;
        }

        .nav-right span {
            margin-left: 20px;
            cursor: pointer;
            display: inline-block;
            padding: 6px 12px;
            border: 1px solid transparent;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .nav-right span:hover {
            background: transparent;
            border-color: #fff;
            color: #fff;
        }

        /* 页面主体布局 */
        .main {
            width: 1200px;
            max-width: calc(100% - 40px);
            margin: 20px auto 0;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* 右侧内容区 */
        .center {
            flex: 1;
            min-width: 0;
            background: rgba(0, 0, 0, 0.28);
            border-radius: 12px;
            padding: 20px;
        }

        /* 列表卡片 */
        .title {
            font-size: 30px;
            margin-bottom: 20px;
        }

        .keyword {
            font-size: 18px;
            margin-bottom: 25px;
            color: #ddd;
        }

        .list {
            list-style: none;
        }

        .item {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 14px;
            cursor: pointer;
        }

        .item-title {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .item-content {
            font-size: 15px;
            line-height: 1.8;
            color: #e3e3e3;
            margin-bottom: 10px;
        }

        .item-time {
            font-size: 13px;
            color: #cfcfcf;
            margin-bottom: 10px;
        }

        .item-actions {
            display: flex;
            gap: 22px;
            font-size: 14px;
            color: #d6d6d6;
        }

        .item-action {
            cursor: default;
        }

        .item-action.share {
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .item-action.share:hover {
            color: #fff;
        }

        .empty {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            font-size: 16px;
            color: #ddd;
        }
    </style>
</head>
<body>

<!-- 顶部 -->
<div class="nav">
    <div class="nav-left">WANGLIU</div>
    <div class="nav-right">
        <span onclick="window.location.href='/index.html'">首页</span>
        <span onclick="window.location.href='/article.html'">文章</span>
        <span onclick="window.location.href='/repo.html'">仓库</span>
        <span onclick="window.location.href='/hot.html'">热点</span>
        <span onclick="window.location.href='/publish.html'">发布</span>
    </div>
</div>

<!-- 中间 -->
<div class="main">
    <div class="center">
        <div class="title">文章搜索结果</div>
        <div class="keyword" id="keyword"></div>
        <ul class="list" id="resultList"></ul>
        <div class="empty" id="emptyBox" style="display:none;">没有查询到匹配文章</div>
    </div>
</div>

<script>
    const token = localStorage.getItem("token");

    if (!token) {
        window.location.href = "/login.html";
    }

    //页面元素缓存
    const keyword = new URLSearchParams(window.location.search).get("keyword") || "";
    const keywordText = document.getElementById("keyword");
    const resultList = document.getElementById("resultList");
    const emptyBox = document.getElementById("emptyBox");

    //关键词展示功能
    keywordText.innerText = `关键词：${keyword}`;

    //文章字段兼容功能
    function getText(post) {
        return post.summary || post.content || post.desc || "";
    }

    function getTitle(post) {
        return post.title || post.name || "未命名文章";
    }

    function getTime(post) {
        return post.createTime || post.createdAt || post.time || "";
    }

    function getCommentCount(post) {
        return post.commentCount || post.comments || post.commentNum || 0;
    }

    function getLikeCount(post) {
        return post.likeCount || post.likes || post.thumbUp || post.likedNum || 0;
    }

    function getPostId(post) {
        return post.id || post.postId;
    }

    function handleShareClick(event, post) {
        event.stopPropagation();
        const id = getPostId(post);
        const shareUrl = id ? `${window.location.origin}/post-detail.html?id=${id}` : window.location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(shareUrl)
                .then(() => alert("已复制转发链接"))
                .catch(() => alert("转发链接：" + shareUrl));
        } else {
            alert("转发链接：" + shareUrl);
        }
    }

    //搜索结果渲染功能
    function renderPosts(posts) {
        resultList.innerHTML = "";

        if (!Array.isArray(posts) || posts.length === 0) {
            emptyBox.style.display = "block";
            return;
        }

        emptyBox.style.display = "none";

        posts.forEach(post => {
            const li = document.createElement("li");
            li.className = "item";
            li.innerHTML = `
                <div class="item-title">${getTitle(post)}</div>
                <div class="item-content">${getText(post)}</div>
                <div class="item-time">${getTime(post)}</div>
                <div class="item-actions">
                    <span class="item-action">评论 ${getCommentCount(post)}</span>
                    <span class="item-action">点赞 ${getLikeCount(post)}</span>
                    <span class="item-action share">转发</span>
                </div>
            `;

            const shareBtn = li.querySelector(".item-action.share");
            if (shareBtn) {
                shareBtn.addEventListener("click", function(event) {
                    handleShareClick(event, post);
                });
            }
            //点击跳转详情页面
            li.addEventListener("click", function() {
                const id = getPostId(post);
                if (id) {
                    window.location.href = "/post-detail.html?id=" + id;
                }
            });

            resultList.appendChild(li);
        });
    }

    // 搜索功能
    if (!keyword) {
        renderPosts([]);
    } else {
        fetch(`/post/search?keyword=${encodeURIComponent(keyword)}`, {
            method: 'GET',
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('token'),
                'Content-Type': 'application/json'
            }
        })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    renderPosts(data.data || data.list || []);
                } else {
                    renderPosts([]);
                }
            })
            .catch(() => {
                renderPosts([]);
            });
    }
</script>

</body>
</html>
